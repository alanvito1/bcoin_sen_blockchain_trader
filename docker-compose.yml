version: '3.3'

services:
  db:
    image: postgres:15-alpine
    container_name: trader-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autotrader
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trader-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

  bot-engine:
    build: .
    container_name: trader-engine
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: sh -c "npx prisma migrate deploy && node index.js"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/autotrader?schema=public
      - REDIS_URL=redis://redis:6379

volumes:
  pgdata:
  redisdata:
