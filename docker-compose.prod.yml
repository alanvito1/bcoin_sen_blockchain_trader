version: '3.8'

services:
  bot-engine:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: trader-engine
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "src/health.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# Important Note: This file assumes external DB/Redis or that they are managed separately.
# For a full stack on one VPS, use the main docker-compose.yml.
